<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Cultiva - Smart Farming Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">
<h1>🌱 Smart Cultiva Dashboard</h1>

<div class="card">
<h2>Input Kondisi Tanah</h2>

<label>pH Tanah</label>
<input type="number" id="ph" step="0.1" placeholder="Contoh: 6.5">

<label>Suhu Tanah (°C)</label>
<input type="number" id="suhu" placeholder="Contoh: 27">

<label>Kelembapan</label>
<select id="kelembapan">
<option value="">Pilih</option>
<option value="kering">Kering</option>
<option value="sedang">Sedang</option>
<option value="lembap">Lembap</option>
</select>

<button onclick="analisis()">Analisis Sekarang</button>
</div>

<div class="grid">
<div class="card">
<h2>🏆 Top 5 Tanaman Paling Cocok</h2>
<div id="ranking"></div>
</div>

<div class="card">
<h2>📊 Grafik Kondisi Tanah</h2>
<canvas id="chartTanah"></canvas>
</div>
</div>

</div>

<script>
let tanamanDB = [];
let chart;

// Load database JSON
async function loadDatabase() {
    try {
        const response = await fetch('tanaman.json');
        tanamanDB = await response.json();
        console.log("Database loaded:", tanamanDB.length, "tanaman");
    } catch (error) {
        alert("Gagal memuat database tanaman.json");
        console.error(error);
    }
}

loadDatabase();

// Hitung skor kecocokan
function hitungSkor(t, ph, suhu, kelembapan) {
    let skor = 0;

    // Skor pH (40%)
    if (ph >= t.phMin && ph <= t.phMax) {
        skor += 40;
    } else {
        skor += Math.max(0, 40 - Math.abs(ph - (t.phMin + t.phMax)/2) * 10);
    }

    // Skor Suhu (40%)
    if (suhu >= t.suhuMin && suhu <= t.suhuMax) {
        skor += 40;
    } else {
        skor += Math.max(0, 40 - Math.abs(suhu - (t.suhuMin + t.suhuMax)/2) * 5);
    }

    // Skor Kelembapan (20%)
    if (kelembapan === t.kelembapan) {
        skor += 20;
    }

    return Math.round(skor);
}

// Analisis utama
function analisis() {

    if(tanamanDB.length === 0){
        alert("Database belum siap, tunggu beberapa detik lalu coba lagi.");
        return;
    }

    let ph = parseFloat(document.getElementById("ph").value);
    let suhu = parseFloat(document.getElementById("suhu").value);
    let kelembapan = document.getElementById("kelembapan").value;

    if (isNaN(ph) || isNaN(suhu) || kelembapan === "") {
        alert("Lengkapi semua data!");
        return;
    }

    let hasil = tanamanDB.map(t => ({
        nama: t.nama,
        skor: hitungSkor(t, ph, suhu, kelembapan)
    }));

    hasil.sort((a,b)=> b.skor - a.skor);

    let rankingHTML = "";
    hasil.slice(0,5).forEach((t,i)=>{
        rankingHTML += `
        <div class="ranking-item">
            <strong>#${i+1} ${t.nama}</strong><br>
            ${t.skor}% kecocokan
        </div>`;
    });

    document.getElementById("ranking").innerHTML = rankingHTML;

    // Grafik Radar
    let skorPH = (ph/14)*100;
    let skorSuhu = (suhu/40)*100;
    let skorLembap = kelembapan==="kering"?40:
                     kelembapan==="sedang"?80:100;

    const ctx = document.getElementById('chartTanah').getContext('2d');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
    type:'radar',
    data:{
        labels:['pH','Suhu','Kelembapan'],
        datasets:[{
            label:'Kondisi Tanah',
            data:[skorPH, skorSuhu, skorLembap],
            
            backgroundColor: 'rgba(0, 230, 118, 0.3)',  // warna isi
            borderColor: '#00e676',                     // garis utama
            borderWidth: 2,
            pointBackgroundColor: '#00e676',
            pointBorderColor: '#ffffff',
            pointHoverBackgroundColor: '#ffffff',
            pointHoverBorderColor: '#00e676'
        }]
    },
    options:{
        responsive:true,
        scales:{ 
            r:{ 
                min:0, 
                max:100,
                grid: { color: 'rgba(255,255,255,0.2)' },
                angleLines: { color: 'rgba(255,255,255,0.2)' },
                pointLabels: { color: 'white' },
                ticks: { backdropColor: 'transparent', color: 'white' }
            } 
        },
        plugins: {
            legend: {
                labels: { color: 'white' }
            }
        }
    }
});
}
</script>

</body>
</html>
